name: Build Windows Portable

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Windows build tools
        run: |
          choco install openssl --no-progress -y
          choco install wkhtmltopdf --no-progress -y || true
        shell: pwsh

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install npm dependencies
        run: npm ci

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" || true

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        run: cargo tauri build
        working-directory: src-tauri

      - name: List build outputs
        if: always()
        run: |
          dir src-tauri\target\release\bundle /s /b
        shell: cmd

      - name: Upload portable .exe
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: MyTerminal-windows
          path: |
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
          if-no-files-found: warn
